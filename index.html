<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HABIT TRACKER | TERMINAL</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">

<!-- Hacker Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700;800&display=swap" rel="stylesheet">

<link rel="icon" sizes="192x192" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="manifest" href="manifest.json">

<style>
:root {
  --bg: #000000;
  --card: rgba(0, 0, 0, 0.9);
  --rowA: rgba(0, 0, 0, 0.9);
  --rowB: rgba(0, 0, 0, 0.9);
  --border: #008f11;
  --text: #00ff41;
  --muted: #008f11;
  --accent: #00ff41;
  --accent-glow: 0 0 12px #00ff41;
  
  --amber: #ffb000;
  --cyan: #00e5ff;
  --danger: #ff0000;
  --glass: rgba(0, 0, 0, 0.95);
}

* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
  outline: none;
}

html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  font-family: 'JetBrains Mono', 'Courier New', monospace;
  background: var(--bg);
  color: var(--text);
  overflow-x: hidden;
}

#matrix-bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -1;
  opacity: 0.15;
}

/* Header & Digital Effect */
header {
  padding: env(safe-area-inset-top, 0) 24px 12px;
  background: var(--glass);
  position: sticky;
  top: 0;
  z-index: 300;
  display: flex;
  flex-direction: column;
  align-items: center;
  border-bottom: 2px solid var(--cyan);
  box-shadow: 0 0 20px rgba(0, 229, 255, 0.3);
}

header h1 {
  margin: 15px 0 5px;
  font-size: 24px;
  font-weight: 800;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--cyan);
  text-shadow: 0 0 10px var(--cyan);
}

.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 20px 12px 140px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

#userProfile {
  display: none;
  align-items: center;
  gap: 10px;
  padding: 6px 12px;
  background: rgba(0, 229, 255, 0.1);
  border: 1px solid var(--cyan);
  margin-top: 5px;
}

#userPic {
  width: 24px;
  height: 24px;
  border-radius: 0;
  border: 1px solid var(--cyan);
}

#userName { font-size: 11px; font-weight: 400; color: var(--cyan); }

/* Terminal Cards */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 0;
  padding: 16px;
  box-shadow: inset 0 0 15px rgba(0, 255, 65, 0.05);
  position: relative;
}

.card::before {
  content: "";
  position: absolute;
  top: 2px;
  left: 2px;
  right: 2px;
  height: 1px;
  background: rgba(0, 255, 65, 0.2);
}

.controls-card { border-color: var(--cyan); box-shadow: inset 0 0 15px rgba(0, 229, 255, 0.05); }
.yearly-card { border-color: var(--amber); box-shadow: inset 0 0 15px rgba(255, 176, 0, 0.05); }

.controls {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

#newHabit { grid-column: span 2; border-color: var(--cyan); }

input, select, button {
  background: black;
  color: var(--text);
  border: 1px solid var(--border);
  padding: 10px;
  border-radius: 0;
  font-family: inherit;
  font-size: 14px;
}

input::placeholder { color: var(--muted); opacity: 0.5; }
input:focus, select:focus { border-color: var(--cyan); box-shadow: 0 0 8px var(--cyan); }

button {
  cursor: pointer;
  font-weight: 700;
  text-transform: uppercase;
}

button.primary {
  background: var(--cyan);
  color: black;
  grid-column: span 2;
  box-shadow: 0 0 12px var(--cyan);
  border-color: var(--cyan);
}

button:active { transform: scale(0.98); }

/* Dashboard Terminal Stats */
.dashboard {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}

.stat { background: rgba(0, 0, 0, 0.8); padding: 12px; border: 1px solid var(--border); }
.stat.eff { border-color: var(--amber); box-shadow: 0 0 10px rgba(255, 176, 0, 0.2); }
.stat.top { border-color: var(--accent); box-shadow: 0 0 10px rgba(0, 255, 65, 0.2); }
.stat.weak { border-color: var(--danger); box-shadow: 0 0 10px rgba(255, 0, 0, 0.2); }

.stat label { font-size: 10px; text-transform: uppercase; opacity: 0.8; }
.stat.eff label { color: var(--amber); }
.stat.top label { color: var(--accent); }
.stat.weak label { color: var(--danger); }

.stat span {
  font-size: 18px;
  font-weight: 800;
  display: block;
  margin-top: 5px;
  word-break: break-all;
}
.stat.eff span { color: var(--amber); }
.stat.top span { color: var(--accent); }
.stat.weak span { color: var(--danger); }

/* Table Digital Design */
.table-shell { padding: 0; border-color: var(--cyan); }
.table-header-row {
  display: flex;
  padding: 12px 16px;
  background: rgba(0, 229, 255, 0.2);
  border-bottom: 2px solid var(--cyan);
}

.table-header-row h3 { margin: 0; font-size: 16px; color: var(--cyan); text-shadow: 0 0 5px var(--cyan); letter-spacing: 1px; }

.table-wrapper { overflow: auto; position: relative; }

.grid {
  display: grid;
  grid-template-columns: 140px repeat(var(--days), 38px) 54px 38px;
}

.table-header {
  background: #000;
  position: sticky;
  top: 0;
  z-index: 100;
  border-bottom: 2px solid var(--cyan);
}

.table-header div {
  padding: 10px 0;
  text-align: center;
  font-size: 11px;
  border-right: 1px solid var(--border);
  background: #000;
  color: var(--cyan);
}

.row { border-bottom: 1px solid var(--border); background: #000; }
.row:nth-child(even) { background: #050505; }

.cell {
  padding: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-right: 1px solid var(--border);
}

.cell.habit-name {
  justify-content: flex-start;
  font-size: 12px;
  position: sticky;
  left: 0;
  background: #000 !important;
  padding-left: 10px;
  z-index: 150;
  border-right: 2px solid var(--cyan);
  color: var(--accent);
}

.row:nth-child(even) .cell.habit-name { background: #050505 !important; }

/* Checkbox Style: Terminal Square */
.box {
  width: 22px;
  height: 22px;
  border: 1px solid var(--border);
  background: transparent;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}

.box.checked {
  background: var(--accent);
  box-shadow: var(--accent-glow);
}

.box.checked::after { content: "■"; color: black; font-size: 14px; }

.delete { cursor: pointer; color: var(--muted); font-size: 14px; }
.delete:hover { color: var(--danger); text-shadow: 0 0 5px var(--danger); }

.today { background: rgba(0, 229, 255, 0.1) !important; color: var(--cyan); }

/* Yearly Terminal */
.yearly-section h3 { font-size: 16px; text-transform: uppercase; color: var(--amber); border-bottom: 1px solid var(--amber); margin-bottom: 12px; padding-bottom: 4px; }
.yearly-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
.month-item { border: 1px solid var(--amber); padding: 8px; text-align: center; background: rgba(255, 176, 0, 0.05); }
.month-item label { font-size: 10px; display: block; color: var(--amber); }
.month-item b { font-size: 13px; margin-top: 4px; display: block; color: var(--amber); }

/* Global Digital Overlays */
.nav-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--glass);
  border-top: 2px solid var(--cyan);
  display: flex;
  justify-content: space-around;
  z-index: 200;
  padding-bottom: env(safe-area-inset-bottom, 0);
  box-shadow: 0 0 20px rgba(0, 229, 255, 0.2);
}

.nav-item {
  color: var(--cyan);
  background: transparent;
  border: none;
  font-size: 10px;
  padding: 14px 4px;
  text-transform: uppercase;
  flex: 1;
  font-weight: 700;
}

.nav-item:active { background: var(--cyan); color: black; }

@media (max-width: 600px) {
  .dashboard { grid-template-columns: 1fr; }
  .stat { flex-direction: row; justify-content: space-between; align-items: center; }
  .stat span { margin-top: 0; font-size: 16px; }
  .grid { grid-template-columns: 120px repeat(var(--days), 38px) 54px 38px; }
  .yearly-grid { grid-template-columns: repeat(3, 1fr); }
}

</style>
</head>
<body>

<canvas id="matrix-bg"></canvas>

<header>
  <h1>HABIT TRACKER</h1>
  <div id="userProfile">
    <img id="userPic" alt="ID">
    <span id="userName"></span>
  </div>
</header>

<div class="container" id="appContent">
  
  <div class="card dashboard">
    <div class="stat eff"><label>EFFICIENCY</label><span id="overall">0%</span></div>
    <div class="stat top"><label>TOP_NODE</label><span id="best">-</span></div>
    <div class="stat weak"><label>WEAK_NODE</label><span id="worst">-</span></div>
  </div>

  <div class="card table-shell">
    <div class="table-header-row"><h3>> USER_DATABASE</h3></div>
    <div class="table-wrapper">
      <div id="header" class="grid table-header"></div>
      <div id="body"></div>
    </div>
  </div>

  <div class="card controls-card">
    <div class="controls">
      <select id="year"></select>
      <select id="month"></select>
      <input id="newHabit" placeholder="NEW_DATABASE_ENTRY..." enterkeyhint="done">
      <button onclick="addHabit()" class="primary">INSERT ENTRY</button>
      <button id="loginBtn" style="color:var(--cyan); border-color:var(--cyan); font-size: 11px;">AUTH_ACCESS</button>
      <button id="logoutBtn" style="display:none; color:var(--cyan); border-color:var(--cyan); font-size: 11px;">TERM_SESSION</button>
    </div>
  </div>

  <div class="card yearly-card yearly-section">
    <h3>DATA_INSIGHTS</h3>
    <div id="yearly" class="yearly-grid"></div>
  </div>
</div>

<nav class="nav-bar">
  <button class="nav-item" onclick="window.scrollTo({top:0, behavior:'smooth'})">HOME</button>
  <button class="nav-item" onclick="exportCSV()">BACKUP</button>
  <button class="nav-item" onclick="showInstallPrompt()" id="installBtnItem">SYNC_APP</button>
  <button class="nav-item" style="color:var(--muted)">v2.4.2</button>
</nav>

<script>
/* MATRIX RAIN EFFECT - ENHANCED COLOR */
const canvas = document.getElementById('matrix-bg');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.onresize = resize;
resize();

const chars = "0123456789ABCDEFHIJKLMNOPQRSTUVWXYZアイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン";
const fontSize = 16;
const columns = canvas.width / fontSize;
const drops = Array(Math.floor(columns)).fill(1);
const colors = ["#00ff41", "#008f11", "#00e5ff", "#007a8a"];

function draw() {
  ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.font = fontSize + 'px monospace';

  for (let i = 0; i < drops.length; i++) {
    const text = chars[Math.floor(Math.random() * chars.length)];
    ctx.fillStyle = colors[Math.floor(Math.random() * colors.length)];
    ctx.fillText(text, i * fontSize, drops[i] * fontSize);
    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
      drops[i] = 0;
    }
    drops[i]++;
  }
}
setInterval(draw, 33);

/* CORE LOGIC PRESERVATION */
let USER_KEY = "guest";
function setUser(uid) { USER_KEY = uid || "guest" }
function ukey(k) { return USER_KEY + "::" + k }

let habits = JSON.parse(localStorage.getItem(ukey("habit-list"))) || [
  "Daily Exercise", "Drink 2L Water", "Read 10 Pages",
  "Sleep Before 11 PM", "Meditation", "No Junk Food", "Work on Goals"
];

const yearSel = document.getElementById("year");
const monthSel = document.getElementById("month");
const header = document.getElementById("header");
const body = document.getElementById("body");

const now = new Date();
const currentYear = now.getFullYear();

for(let y = currentYear - 2; y <= currentYear + 5; y++) {
  let o = document.createElement("option"); o.value = y; o.text = y;
  if(y === currentYear) o.selected = true;
  yearSel.appendChild(o);
}
for(let m = 0; m < 12; m++) {
  let o = document.createElement("option"); o.value = m;
  o.text = new Date(2025, m).toLocaleString("default", { month: "long" });
  if(m === now.getMonth()) o.selected = true;
  monthSel.appendChild(o);
}

function daysInMonth(y, m) { return new Date(y, m + 1, 0).getDate() }
function key(y, m, h, d) { return `${y}-${m}-${h}-${d}` }
function isTodayCell(y, m, d) {
  const t = new Date();
  return y === t.getFullYear() && m === t.getMonth() && d === t.getDate();
}

function saveHabits() { localStorage.setItem(ukey("habit-list"), JSON.stringify(habits)) }

function addHabit() {
  const i = document.getElementById("newHabit");
  if(!i.value.trim()) return;
  habits.push(i.value.trim());
  saveHabits();
  syncToCloud(ukey("habit-list"), JSON.stringify(habits));
  i.value = "";
  render();
}

function removeHabit(h) {
  if(!confirm(`Delete "${h}"?`)) return;
  habits = habits.filter(x => x !== h);
  saveHabits();
  syncToCloud(ukey("habit-list"), JSON.stringify(habits));
  render();
}

function toggle(h, d) {
  const y = +yearSel.value, m = +monthSel.value, k = key(y, m, h, d);
  const v = localStorage.getItem(ukey(k)) !== "true";
  localStorage.setItem(ukey(k), v);
  syncToCloud(ukey(k), v);
  render();
}

function render() {
  const y = +yearSel.value, m = +monthSel.value, days = daysInMonth(y, m);
  header.style.setProperty("--days", days);
  body.style.setProperty("--days", days);
  header.innerHTML = "<div>Habit</div>";
  for(let d = 1; d <= days; d++) {
    header.innerHTML += `<div class="${isTodayCell(y, m, d) ? "today" : ""}">${d}</div>`;
  }
  header.innerHTML += "<div>%</div><div>🗑</div>";

  let totalP = 0, best = { n: "-", v: -1 }, worst = { n: "-", v: 101 };
  body.innerHTML = "";

  habits.forEach(h => {
    let done = 0;
    const row = document.createElement("div");
    row.className = "grid row";
    row.innerHTML = `<div class="cell habit-name">${h}</div>`;

    for(let d = 1; d <= days; d++) {
      const c = localStorage.getItem(ukey(key(y, m, h, d))) === "true";
      if(c) done++;
      row.innerHTML += `
        <div class="cell ${isTodayCell(y, m, d) ? "today" : ""}">
          <div class="box ${c ? "checked" : ""}" onclick="toggle('${h}', ${d})"></div>
        </div>`;
    }
    const p = Math.round(done / days * 100);
    totalP += p;
    if(p > best.v) best = { n: h, v: p };
    if(p < worst.v) worst = { n: h, v: p };

    row.innerHTML += `<div class="cell" style="font-weight:800;color:var(--accent)">${p}%</div>`;
    row.innerHTML += `<div class="cell delete" onclick="removeHabit('${h}')">✕</div>`;
    body.appendChild(row);
  });

  document.getElementById("overall").innerText = Math.round(totalP / (habits.length || 1)) + "%";
  document.getElementById("best").innerText = best.n;
  document.getElementById("worst").innerText = worst.n;
  yearly(y);
}

function yearly(y) {
  const box = document.getElementById("yearly");
  box.innerHTML = "";
  for(let m = 0; m < 12; m++) {
    let days = daysInMonth(y, m), sum = 0;
    habits.forEach(h => {
      let d = 0;
      for(let i = 1; i <= days; i++) if(localStorage.getItem(ukey(key(y, m, h, i))) === "true") d++;
      sum += d / days * 100;
    });
    box.innerHTML += `
      <div class="month-item">
        <label>${new Date(y, m).toLocaleString("default", { month: "short" })}</label>
        <b>${Math.round(sum / (habits.length || 1))}%</b>
      </div>`;
  }
}

yearSel.onchange = render;
monthSel.onchange = render;
render();

function exportCSV() {
  const y = +yearSel.value, m = +monthSel.value, days = daysInMonth(y, m);
  let csv = "Habit," + Array.from({ length: days }, (_, i) => i + 1).join(",") + "\n";
  habits.forEach(h => {
    csv += `"${h}"`;
    for(let d = 1; d <= days; d++) csv += localStorage.getItem(ukey(key(y, m, h, d))) === "true" ? ",✔" : ",";
    csv += "\n";
  });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([csv], { type: "text/csv" }));
  a.download = `habits-${y}-${m + 1}.csv`;
  a.click();
}

function toggleTheme() {
  const r = document.documentElement;
  r.dataset.theme = r.dataset.theme === "light" ? "dark" : "light";
  localStorage.setItem("theme", r.dataset.theme);
}
document.documentElement.dataset.theme = localStorage.getItem("theme") || "dark";

/* Register PWA Service Worker */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').then(() => console.log("Service Worker Registered"));
  });
}

let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('installBtnItem').style.display = 'flex';
});

async function showInstallPrompt() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    if (outcome === 'accepted') deferredPrompt = null;
  } else {
    alert("To install: Open browser menu -> Install or Add to Home Screen");
  }
}
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyDNoBvgu7W4txBT-nbnho_ILwU462bhlC4",
  authDomain: "habit-tracker-de698.firebaseapp.com",
  projectId: "habit-tracker-de698"
});
const auth = getAuth(app), db = getFirestore(app), provider = new GoogleAuthProvider();

async function syncToCloudInternal(key, value) {
  if (USER_KEY === "guest") return;
  try {
    await setDoc(doc(db, "users", USER_KEY), { [key]: { value, updatedAt: Date.now() } }, { merge: true });
  } catch (e) {
    console.error("Sync error:", e);
  }
}
window.syncToCloud = syncToCloudInternal;

const loginBtn = document.getElementById("loginBtn"), logoutBtn = document.getElementById("logoutBtn");
const userProfile = document.getElementById("userProfile"), userPic = document.getElementById("userPic"), userName = document.getElementById("userName");

loginBtn.onclick = () => signInWithPopup(auth, provider).catch(e => {
  if (e.code === 'auth/unauthorized-domain') alert("Authorize your domain in Firebase Console first.");
});
logoutBtn.onclick = () => signOut(auth);

let unsub = null;
onAuthStateChanged(auth, user => {
  if (unsub) unsub();
  if (user) {
    setUser(user.uid);
    loginBtn.style.display = "none"; logoutBtn.style.display = "block";
    userProfile.style.display = "flex"; userPic.src = user.photoURL; userName.textContent = user.displayName;
    
    unsub = onSnapshot(doc(db, "users", user.uid), snap => {
      const data = snap.data();
      if (!data) return;
      Object.keys(data).forEach(k => { if (data[k] && data[k].value !== undefined) localStorage.setItem(k, data[k].value) });
      habits = JSON.parse(localStorage.getItem(ukey("habit-list"))) || habits;
      render();
    });
  } else {
    setUser(null);
    loginBtn.style.display = "block"; logoutBtn.style.display = "none";
    userProfile.style.display = "none";
    render();
  }
});
</script>

</body>
