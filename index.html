<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HABIT TRACKER | TERMINAL</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">

<!-- Hacker Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700;800&display=swap" rel="stylesheet">

<link rel="icon" sizes="192x192" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="manifest" href="manifest.json">

<style>
:root {
  --bg: #000000;
  --card: rgba(0, 0, 0, 0.85);
  --rowA: rgba(0, 255, 65, 0.05);
  --rowB: rgba(0, 0, 0, 0.9);
  --border: #008f11;
  --text: #00ff41;
  --muted: #008f11;
  --accent: #00ff41;
  --accent-glow: 0 0 12px #00ff41;
  --danger: #ff0000;
  --glass: rgba(0, 0, 0, 0.92);
}

* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
  outline: none;
}

html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  font-family: 'JetBrains Mono', 'Courier New', monospace;
  background: var(--bg);
  color: var(--text);
  overflow-x: hidden;
}

#matrix-bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -1;
  opacity: 0.35;
}

/* Header & Digital Effect */
header {
  padding: env(safe-area-inset-top, 0) 24px 12px;
  background: var(--glass);
  position: sticky;
  top: 0;
  z-index: 100;
  display: flex;
  flex-direction: column;
  align-items: center;
  border-bottom: 2px solid var(--border);
  box-shadow: 0 0 20px var(--border);
}

header h1 {
  margin: 15px 0 5px;
  font-size: 24px;
  font-weight: 800;
  letter-spacing: 2px;
  text-transform: uppercase;
  text-shadow: var(--accent-glow);
}

.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 20px 12px 120px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

#userProfile {
  display: none;
  align-items: center;
  gap: 10px;
  padding: 6px 12px;
  background: rgba(0, 255, 65, 0.1);
  border: 1px solid var(--border);
  margin-top: 5px;
}

#userPic {
  width: 24px;
  height: 24px;
  border-radius: 0;
  border: 1px solid var(--accent);
}

#userName { font-size: 11px; font-weight: 400; color: var(--accent); }

/* Terminal Cards */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 0;
  padding: 16px;
  box-shadow: inset 0 0 15px rgba(0, 255, 65, 0.1);
  position: relative;
}

.card::before {
  content: "";
  position: absolute;
  top: 2px;
  left: 2px;
  right: 2px;
  height: 1px;
  background: rgba(0, 255, 65, 0.2);
}

.controls {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

#newHabit { grid-column: span 2; }

input, select, button {
  background: black;
  color: var(--text);
  border: 1px solid var(--border);
  padding: 10px;
  border-radius: 0;
  font-family: inherit;
  font-size: 14px;
  transition: 0.2s;
}

input::placeholder { color: var(--muted); opacity: 0.5; }

button {
  cursor: pointer;
  font-weight: 700;
  text-transform: uppercase;
}

button.primary {
  background: var(--accent);
  color: black;
  grid-column: span 2;
  box-shadow: var(--accent-glow);
}

button:hover { background: rgba(0, 255, 65, 0.1); color: var(--accent); border-color: var(--accent); }
button.primary:hover { background: #008f11; color: #fff; }

/* Dashboard Terminal Stats */
.dashboard {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}

.stat {
  background: rgba(0, 255, 65, 0.05);
  padding: 12px;
  border: 1px solid var(--border);
}

.stat label { font-size: 10px; color: var(--muted); text-transform: uppercase; }
.stat span {
  font-size: 18px;
  font-weight: 800;
  display: block;
  margin-top: 5px;
  word-break: break-all;
}

/* Table Digital Design */
.table-shell { padding: 0; }
.table-header-row {
  display: flex;
  padding: 12px 16px;
  background: rgba(0, 255, 65, 0.15);
  border-bottom: 2px solid var(--border);
}

.table-header-row h3 { margin: 0; font-size: 16px; letter-spacing: 1px; }

.table-wrapper { overflow: auto; }

.grid {
  display: grid;
  grid-template-columns: 140px repeat(var(--days), 38px) 54px 38px;
}

.table-header {
  background: black;
  position: sticky;
  top: 0;
  z-index: 20;
  border-bottom: 2px solid var(--border);
}

.table-header div {
  padding: 10px 0;
  text-align: center;
  font-size: 11px;
  border-right: 1px solid var(--border);
}

.row { border-bottom: 1px solid var(--border); }
.row:nth-child(even) { background: var(--rowA); }

.cell {
  padding: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-right: 1px solid var(--border);
}

.cell.habit-name {
  justify-content: flex-start;
  font-size: 12px;
  position: sticky;
  left: 0;
  background: black;
  padding-left: 10px;
  z-index: 10;
  border-right: 2px solid var(--border);
}

/* Checkbox Style: Terminal Square */
.box {
  width: 20px;
  height: 20px;
  border: 1px solid var(--border);
  background: transparent;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}

.box.checked {
  background: var(--accent);
  box-shadow: var(--accent-glow);
}

.box.checked::after { content: "■"; color: black; font-size: 14px; }

.delete { cursor: pointer; color: var(--muted); font-size: 14px; }
.delete:hover { color: var(--danger); text-shadow: 0 0 5px var(--danger); }

.today { border: 1px solid var(--accent); background: rgba(0, 255, 65, 0.1) !important; }

/* Yearly Terminal */
.yearly-section h3 { font-size: 16px; text-transform: uppercase; border-bottom: 1px solid var(--border); margin-bottom: 12px; padding-bottom: 4px; }
.yearly-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
.month-item { border: 1px solid var(--border); padding: 8px; text-align: center; background: rgba(0, 255, 65, 0.05); }
.month-item label { font-size: 10px; display: block; }
.month-item b { font-size: 13px; margin-top: 4px; display: block; }

/* Global Digital Overlays */
.nav-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--glass);
  border-top: 2px solid var(--border);
  display: flex;
  justify-content: space-around;
  z-index: 200;
  padding-bottom: env(safe-area-inset-bottom, 0);
}

.nav-item {
  color: var(--accent);
  background: transparent;
  border: none;
  font-size: 10px;
  padding: 12px 4px;
  text-transform: uppercase;
  flex: 1;
}

.nav-item:active { background: var(--accent); color: black; }

@media (max-width: 600px) {
  .dashboard { grid-template-columns: 1fr; }
  .stat { flex-direction: row; justify-content: space-between; align-items: center; }
  .stat span { margin-top: 0; font-size: 16px; }
  .yearly-grid { grid-template-columns: repeat(3, 1fr); }
}

</style>
</head>
<body>

<canvas id="matrix-bg"></canvas>

<header>
  <h1>HABIT TRACKER</h1>
  <div id="userProfile">
    <img id="userPic" alt="ID">
    <span id="userName"></span>
  </div>
</header>

<div class="container" id="appContent">
  
  <div class="card dashboard">
    <div class="stat"><label>EFFICIENCY</label><span id="overall">0%</span></div>
    <div class="stat"><label>TOP_NODE</label><span id="best">-</span></div>
    <div class="stat"><label>WEAK_NODE</label><span id="worst">-</span></div>
  </div>

  <div class="card table-shell">
    <div class="table-header-row"><h3>> USER_DATABASE</h3></div>
    <div class="table-wrapper">
      <div id="header" class="grid table-header"></div>
      <div id="body"></div>
    </div>
  </div>

  <div class="card">
    <div class="controls">
      <select id="year"></select>
      <select id="month"></select>
      <input id="newHabit" placeholder="NEW_DATABASE_ENTRY..." enterkeyhint="done">
      <button onclick="addHabit()" class="primary">INSERT ENTRY</button>
      <button id="loginBtn" style="font-size: 11px;">AUTH_ACCESS</button>
      <button id="logoutBtn" style="display:none; font-size: 11px;">TERM_SESSION</button>
    </div>
  </div>

  <div class="card yearly-section">
    <h3>DATA_INSIGHTS</h3>
    <div id="yearly" class="yearly-grid"></div>
  </div>
</div>

<nav class="nav-bar">
  <button class="nav-item" onclick="window.scrollTo({top:0, behavior:'smooth'})">HOME</button>
  <button class="nav-item" onclick="exportCSV()">BACKUP</button>
  <button class="nav-item" onclick="showInstallPrompt()" id="installBtnItem">SYNC_APP</button>
  <button class="nav-item" id="terminal-info">TERM_v2.4.1</button>
</nav>

<script>
/* MATRIX RAIN EFFECT */
const canvas = document.getElementById('matrix-bg');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.onresize = resize;
resize();

const chars = "0123456789ABCDEFHIJKLMNOPQRSTUVWXYZアイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン";
const fontSize = 16;
const columns = canvas.width / fontSize;
const drops = Array(Math.floor(columns)).fill(1);

function draw() {
  ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#00ff41';
  ctx.font = fontSize + 'px monospace';

  for (let i = 0; i < drops.length; i++) {
    const text = chars[Math.floor(Math.random() * chars.length)];
    ctx.fillText(text, i * fontSize, drops[i] * fontSize);
    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
      drops[i] = 0;
    }
    drops[i]++;
  }
}
setInterval(draw, 33);

/* CORE LOGIC PRESERVATION */
let USER_KEY = "guest";
function setUser(uid) { USER_KEY = uid || "guest" }
function ukey(k) { return USER_KEY + "::" + k }

let habits = JSON.parse(localStorage.getItem(ukey("habit-list"))) || [
  "Daily Exercise", "Drink 2L Water", "Read 10 Pages",
  "Sleep Before 11 PM", "Meditation", "No Junk Food", "Work on Goals"
];

const yearSel = document.getElementById("year");
const monthSel = document.getElementById("month");
const header = document.getElementById("header");
const body = document.getElementById("body");

const now = new Date();
const currentYear = now.getFullYear();

for(let y = currentYear - 2; y <= currentYear + 5; y++) {
  let o = document.createElement("option"); o.value = y; o.text = y;
  if(y === currentYear) o.selected = true;
  yearSel.appendChild(o);
}
for(let m = 0; m < 12; m++) {
  let o = document.createElement("option"); o.value = m;
  o.text = new Date(2025, m).toLocaleString("default", { month: "long" });
  if(m === now.getMonth()) o.selected = true;
  monthSel.appendChild(o);
}

function daysInMonth(y, m) { return new Date(y, m + 1, 0).getDate() }
function key(y, m, h, d) { return `${y}-${m}-${h}-${d}` }
function isTodayCell(y, m, d) {
  const t = new Date();
  return y === t.getFullYear() && m === t.getMonth() && d === t.getDate();
}

function saveHabits() { localStorage.setItem(ukey("habit-list"), JSON.stringify(habits)) }

function addHabit() {
  const i = document.getElementById("newHabit");
  if(!i.value.trim()) return;
  habits.push(i.value.trim());
  saveHabits();
  syncToCloud(ukey("habit-list"), JSON.stringify(habits));
  i.value = "";
  render();
}

function removeHabit(h) {
  if(!confirm(`Delete "${h}"?`)) return;
  habits = habits.filter(x => x !== h);
  saveHabits();
  syncToCloud(ukey("habit-list"), JSON.stringify(habits));
  render();
}

function toggle(h, d) {
  const y = +yearSel.value, m = +monthSel.value, k = key(y, m, h, d);
  const v = localStorage.getItem(ukey(k)) !== "true";
  localStorage.setItem(ukey(k), v);
  syncToCloud(ukey(k), v);
  render();
}

function render() {
  const y = +yearSel.value, m = +monthSel.value, days = daysInMonth(y, m);
  header.style.setProperty("--days", days);
  body.style.setProperty("--days", days);
  header.innerHTML = "<div>Habit</div>";
  for(let d = 1; d <= days; d++) {
    header.innerHTML += `<div class="${isTodayCell(y, m, d) ? "today" : ""}">${d}</div>`;
  }
  header.innerHTML += "<div>%</div><div>🗑</div>";

  let totalP = 0, best = { n: "-", v: -1 }, worst = { n: "-", v: 101 };
  body.innerHTML = "";

  habits.forEach(h => {
    let done = 0;
    const row = document.createElement("div");
    row.className = "grid row";
    row.innerHTML = `<div class="cell habit-name">${h}</div>`;

    for(let d = 1; d <= days; d++) {
      const c = localStorage.getItem(ukey(key(y, m, h, d))) === "true";
      if(c) done++;
      row.innerHTML += `
        <div class="cell ${isTodayCell(y, m, d) ? "today" : ""}">
          <div class="box ${c ? "checked" : ""}" onclick="toggle('${h}', ${d})"></div>
        </div>`;
    }
    const p = Math.round(done / days * 100);
    totalP += p;
    if(p > best.v) best = { n: h, v: p };
    if(p < worst.v) worst = { n: h, v: p };

    row.innerHTML += `<div class="cell" style="font-weight:800;color:var(--accent)">${p}%</div>`;
    row.innerHTML += `<div class="cell delete" onclick="removeHabit('${h}')">✕</div>`;
    body.appendChild(row);
  });

  document.getElementById("overall").innerText = Math.round(totalP / (habits.length || 1)) + "%";
  document.getElementById("best").innerText = best.n;
  document.getElementById("worst").innerText = worst.n;
  yearly(y);
}

function yearly(y) {
  const box = document.getElementById("yearly");
  box.innerHTML = "";
  for(let m = 0; m < 12; m++) {
    let days = daysInMonth(y, m), sum = 0;
    habits.forEach(h => {
      let d = 0;
      for(let i = 1; i <= days; i++) if(localStorage.getItem(ukey(key(y, m, h, i))) === "true") d++;
      sum += d / days * 100;
    });
    box.innerHTML += `
      <div class="month-item">
        <label>${new Date(y, m).toLocaleString("default", { month: "short" })}</label>
        <b>${Math.round(sum / (habits.length || 1))}%</b>
      </div>`;
  }
}

yearSel.onchange = render;
monthSel.onchange = render;
render();

function exportCSV() {
  const y = +yearSel.value, m = +monthSel.value, days = daysInMonth(y, m);
  let csv = "Habit," + Array.from({ length: days }, (_, i) => i + 1).join(",") + "\n";
  habits.forEach(h => {
    csv += `"${h}"`;
    for(let d = 1; d <= days; d++) csv += localStorage.getItem(ukey(key(y, m, h, d))) === "true" ? ",✔" : ",";
    csv += "\n";
  });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([csv], { type: "text/csv" }));
  a.download = `habits-${y}-${m + 1}.csv`;
  a.click();
}

function toggleTheme() {
  const r = document.documentElement;
  r.dataset.theme = r.dataset.theme === "light" ? "dark" : "light";
  localStorage.setItem("theme", r.dataset.theme);
}
document.documentElement.dataset.theme = localStorage.getItem("theme") || "dark";

/* Register PWA Service Worker */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').then(() => console.log("Service Worker Registered"));
  });
}

let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('installBtnItem').style.display = 'flex';
});

async function showInstallPrompt() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    if (outcome === 'accepted') deferredPrompt = null;
  } else {
    alert("To install: Open browser menu -> Install or Add to Home Screen");
  }
}
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyDNoBvgu7W4txBT-nbnho_ILwU462bhlC4",
  authDomain: "habit-tracker-de698.firebaseapp.com",
  projectId: "habit-tracker-de698"
});
const auth = getAuth(app), db = getFirestore(app), provider = new GoogleAuthProvider();

async function syncToCloudInternal(key, value) {
  if (USER_KEY === "guest") return;
  try {
    await setDoc(doc(db, "users", USER_KEY), { [key]: { value, updatedAt: Date.now() } }, { merge: true });
  } catch (e) {
    console.error("Sync error:", e);
  }
}
window.syncToCloud = syncToCloudInternal;

const loginBtn = document.getElementById("loginBtn"), logoutBtn = document.getElementById("logoutBtn");
const userProfile = document.getElementById("userProfile"), userPic = document.getElementById("userPic"), userName = document.getElementById("userName");

loginBtn.onclick = () => signInWithPopup(auth, provider).catch(e => {
  if (e.code === 'auth/unauthorized-domain') alert("Authorize your domain in Firebase Console first.");
});
logoutBtn.onclick = () => signOut(auth);

let unsub = null;
onAuthStateChanged(auth, user => {
  if (unsub) unsub();
  if (user) {
    setUser(user.uid);
    loginBtn.style.display = "none"; logoutBtn.style.display = "block";
    userProfile.style.display = "flex"; userPic.src = user.photoURL; userName.textContent = user.displayName;
    
    unsub = onSnapshot(doc(db, "users", user.uid), snap => {
      const data = snap.data();
      if (!data) return;
      Object.keys(data).forEach(k => { if (data[k] && data[k].value !== undefined) localStorage.setItem(k, data[k].value) });
      habits = JSON.parse(localStorage.getItem(ukey("habit-list"))) || habits;
      render();
    });
  } else {
    setUser(null);
    loginBtn.style.display = "block"; logoutBtn.style.display = "none";
    userProfile.style.display = "none";
    render();
  }
});
</script>

</body>
</html>
