<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Habit Pro | Build Better Rituals</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0b0f14">

<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">

<link rel="icon" sizes="192x192" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="manifest" href="manifest.json">

<style>
:root {
  --bg: #0b0f14;
  --card: #141922;
  --rowA: #1a202c;
  --rowB: #141922;
  --border: rgba(255, 255, 255, 0.08);
  --text: #ffffff;
  --muted: #94a3b8;
  --accent: #10b981;
  --accent-glow: rgba(16, 185, 129, 0.4);
  --danger: #ef4444;
  --glass: rgba(20, 25, 34, 0.7);
}

:root[data-theme="light"] {
  --bg: #f8fafc;
  --card: #ffffff;
  --rowA: #f1f5f9;
  --rowB: #ffffff;
  --border: #e2e8f0;
  --text: #1e293b;
  --muted: #64748b;
  --accent: #059669;
  --accent-glow: rgba(5, 150, 105, 0.2);
  --glass: rgba(255, 255, 255, 0.8);
}

* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
  outline: none;
}

html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow-x: hidden;
}

/* Animations */
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* Header & Glass Effect */
header {
  padding: env(safe-area-inset-top, 0) 24px 20px;
  background: var(--glass);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  position: sticky;
  top: 0;
  z-index: 100;
  display: flex;
  flex-direction: column;
  align-items: center;
  border-bottom: 1px solid var(--border);
}

header h1 {
  margin: 20px 0 10px;
  font-size: 26px;
  font-weight: 800;
  letter-spacing: -0.5px;
  background: linear-gradient(135deg, #fff 30%, var(--accent));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

:root[data-theme="light"] header h1 {
  background: linear-gradient(135deg, #1e293b 30%, var(--accent));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 24px 16px 120px;
  display: flex;
  flex-direction: column;
  gap: 24px;
}

/* Auth Profile Styles */
#userProfile {
  display: none;
  align-items: center;
  gap: 10px;
  padding: 8px 12px;
  background: var(--border);
  border-radius: 50px;
  margin-top: 10px;
}

#userPic {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 1px solid var(--accent);
}

#userName {
  font-size: 13px;
  font-weight: 600;
  color: var(--muted);
}

/* Cards & Controls */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 20px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.1);
  animation: fadeIn 0.5s ease backwards;
}

.controls {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.controls input {
  grid-column: span 2;
}

input, select, button {
  background: var(--rowA);
  color: var(--text);
  border: 1px solid var(--border);
  padding: 12px 16px;
  border-radius: 14px;
  font-family: inherit;
  font-size: 15px;
  min-height: 48px;
  transition: all 0.2s;
}

button {
  cursor: pointer;
  font-weight: 600;
  border: none;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

button.primary {
  background: var(--accent);
  color: white;
  grid-column: span 2;
}

button.primary:hover {
  filter: brightness(1.1);
  transform: translateY(-1px);
}

button.primary:active {
  transform: scale(0.98);
}

/* Dashboard Stats */
.dashboard {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
}

.stat {
  background: var(--rowA);
  padding: 16px;
  border-radius: 18px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

.stat label {
  font-size: 12px;
  color: var(--muted);
  font-weight: 600;
  text-transform: uppercase;
}

.stat span {
  font-size: 20px;
  font-weight: 800;
  margin-top: 8px;
  color: var(--accent);
}

/* Table Design */
.table-shell {
  padding: 0;
  overflow: hidden;
}

.table-header-row {
  display: flex;
  align-items: center;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
}

.table-header-row h3 {
  margin: 0;
  font-size: 18px;
}

.table-wrapper {
  overflow: auto;
  -webkit-overflow-scrolling: touch;
  position: relative;
}

.grid {
  display: grid;
  grid-template-columns: 160px repeat(var(--days), 48px) 64px 48px;
}

.table-header {
  background: var(--bg);
  position: sticky;
  top: 0;
  z-index: 20;
  border-bottom: 1px solid var(--border);
}

.table-header div {
  padding: 12px 0;
  text-align: center;
  font-weight: 600;
  font-size: 13px;
  color: var(--muted);
}

.row {
  border-bottom: 1px solid var(--border);
  transition: background 0.2s;
}

.row:hover { background: rgba(255,255,255,0.02); }

.cell {
  padding: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-right: 1px solid var(--border);
}

.cell.habit-name {
  justify-content: flex-start;
  font-weight: 600;
  font-size: 14px;
  position: sticky;
  left: 0;
  background: var(--card);
  padding-left: 20px;
  z-index: 10;
  border-right: 2px solid var(--border);
}

/* Checkbox Style */
.box {
  width: 32px;
  height: 32px;
  border-radius: 10px;
  background: var(--border);
  cursor: pointer;
  transition: all 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  display: flex;
  align-items: center;
  justify-content: center;
}

.box.checked {
  background: var(--accent);
  box-shadow: 0 0 15px var(--accent-glow);
  transform: scale(1.05);
}

.box.checked::after {
  content: "✓";
  color: white;
  font-weight: bold;
  font-size: 16px;
}

.box:active { transform: scale(0.9); }

.delete {
  color: var(--muted);
  cursor: pointer;
  transition: color 0.2s;
}

.delete:hover { color: var(--danger); }

.today {
  background: rgba(16, 185, 129, 0.08) !important;
}

/* Yearly Overview */
.yearly-section h3 { margin: 0 0 16px; font-size: 18px; }

.yearly-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}

.month-item {
  background: var(--rowA);
  padding: 12px;
  border-radius: 16px;
  text-align: center;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.month-item label { font-size: 11px; color: var(--muted); font-weight: 600; }
.month-item b { font-size: 16px; color: var(--accent); }

/* Bottom Navbar */
.nav-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--glass);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-top: 1px solid var(--border);
  padding: 12px 16px calc(12px + env(safe-area-inset-bottom, 0));
  display: flex;
  justify-content: space-around;
  z-index: 200;
}

.nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  color: var(--muted);
  border: none;
  background: none;
  padding: 8px;
  min-width: 60px;
  min-height: auto;
}

.nav-active {
  color: var(--accent);
}

.nav-icon {
  font-size: 22px;
}

/* Mobile Responsiveness */
@media (max-width: 600px) {
  .dashboard { grid-template-columns: 1fr; }
  .grid { grid-template-columns: 130px repeat(var(--days), 44px) 60px 48px; }
  .stat { flex-direction: row; align-items: center; }
  .stat span { margin-top: 0; }
  .yearly-grid { grid-template-columns: repeat(3, 1fr); }
  
  .desktop-only { display: none !important; }
}

</style>
</head>
<body>

<header>
  <h1>Habit Pro</h1>
  <div id="userProfile">
    <img id="userPic" alt="Profile">
    <span id="userName"></span>
  </div>
</header>

<div class="container" id="appContent">
  
  <!-- Step 1: Analytics -->
  <div class="card dashboard">
    <div class="stat">
      <label>Overall</label>
      <span id="overall">0%</span>
    </div>
    <div class="stat">
      <label>Goal Reached</label>
      <span id="best">-</span>
    </div>
    <div class="stat">
      <label>Needs Focus</label>
      <span id="worst">-</span>
    </div>
  </div>

  <!-- Step 2: Main Rituals -->
  <div class="card table-shell">
    <div class="table-header-row">
      <h3>Active Rituals</h3>
    </div>
    <div class="table-wrapper">
      <div id="header" class="grid table-header"></div>
      <div id="body"></div>
    </div>
  </div>

  <!-- Step 3: Global Actions -->
  <div class="card">
    <div class="controls">
      <select id="year"></select>
      <select id="month"></select>
      <input id="newHabit" placeholder="New habit name..." enterkeyhint="done">
      <button onclick="addHabit()" class="primary">Add Ritual</button>
      
      <button id="loginBtn">Login to Sync</button>
      <button id="logoutBtn" style="display:none">Logout</button>
    </div>
  </div>

  <!-- Yearly Insights -->
  <div class="card yearly-section">
    <h3>Insights</h3>
    <div id="yearly" class="yearly-grid"></div>
  </div>

</div>

<!-- Bottom App Navigation -->
<nav class="nav-bar">
  <button class="nav-item nav-active" onclick="window.scrollTo({top:0, behavior:'smooth'})">
    <span class="nav-icon">🏠</span>
    <span style="font-size: 10px;">Home</span>
  </button>
  <button class="nav-item" onclick="toggleTheme()">
    <span class="nav-icon">🌓</span>
    <span style="font-size: 10px;">Theme</span>
  </button>
  <button class="nav-item" onclick="exportCSV()">
    <span class="nav-icon">📤</span>
    <span style="font-size: 10px;">Export</span>
  </button>
  <button class="nav-item" onclick="showInstallPrompt()" id="installBtnItem">
    <span class="nav-icon">📲</span>
    <span style="font-size: 10px;">Install</span>
  </button>
</nav>

<script>
/* CORE LOGIC PRESERVATION */
let USER_KEY = "guest";
function setUser(uid) { USER_KEY = uid || "guest" }
function ukey(k) { return USER_KEY + "::" + k }

let habits = JSON.parse(localStorage.getItem(ukey("habit-list"))) || [
  "Daily Exercise", "Drink 2L Water", "Read 10 Pages",
  "Sleep Before 11 PM", "Meditation", "No Junk Food", "Work on Goals"
];

const yearSel = document.getElementById("year");
const monthSel = document.getElementById("month");
const header = document.getElementById("header");
const body = document.getElementById("body");

const now = new Date();
const currentYear = now.getFullYear();

for(let y = currentYear - 2; y <= currentYear + 5; y++) {
  let o = document.createElement("option"); o.value = y; o.text = y;
  if(y === currentYear) o.selected = true;
  yearSel.appendChild(o);
}
for(let m = 0; m < 12; m++) {
  let o = document.createElement("option"); o.value = m;
  o.text = new Date(2025, m).toLocaleString("default", { month: "long" });
  if(m === now.getMonth()) o.selected = true;
  monthSel.appendChild(o);
}

function daysInMonth(y, m) { return new Date(y, m + 1, 0).getDate() }
function key(y, m, h, d) { return `${y}-${m}-${h}-${d}` }
function isTodayCell(y, m, d) {
  const t = new Date();
  return y === t.getFullYear() && m === t.getMonth() && d === t.getDate();
}

function saveHabits() { localStorage.setItem(ukey("habit-list"), JSON.stringify(habits)) }

function addHabit() {
  const i = document.getElementById("newHabit");
  if(!i.value.trim()) return;
  habits.push(i.value.trim());
  saveHabits();
  syncToCloud(ukey("habit-list"), JSON.stringify(habits));
  i.value = "";
  render();
}

function removeHabit(h) {
  if(!confirm(`Delete "${h}"?`)) return;
  habits = habits.filter(x => x !== h);
  saveHabits();
  syncToCloud(ukey("habit-list"), JSON.stringify(habits));
  render();
}

function toggle(h, d) {
  const y = +yearSel.value, m = +monthSel.value, k = key(y, m, h, d);
  const v = localStorage.getItem(ukey(k)) !== "true";
  localStorage.setItem(ukey(k), v);
  syncToCloud(ukey(k), v);
  render();
}

function render() {
  const y = +yearSel.value, m = +monthSel.value, days = daysInMonth(y, m);
  header.style.setProperty("--days", days);
  body.style.setProperty("--days", days);
  header.innerHTML = "<div>Habit</div>";
  for(let d = 1; d <= days; d++) {
    header.innerHTML += `<div class="${isTodayCell(y, m, d) ? "today" : ""}">${d}</div>`;
  }
  header.innerHTML += "<div>%</div><div>🗑</div>";

  let totalP = 0, best = { n: "-", v: -1 }, worst = { n: "-", v: 101 };
  body.innerHTML = "";

  habits.forEach(h => {
    let done = 0;
    const row = document.createElement("div");
    row.className = "grid row";
    row.innerHTML = `<div class="cell habit-name">${h}</div>`;

    for(let d = 1; d <= days; d++) {
      const c = localStorage.getItem(ukey(key(y, m, h, d))) === "true";
      if(c) done++;
      row.innerHTML += `
        <div class="cell ${isTodayCell(y, m, d) ? "today" : ""}">
          <div class="box ${c ? "checked" : ""}" onclick="toggle('${h}', ${d})"></div>
        </div>`;
    }
    const p = Math.round(done / days * 100);
    totalP += p;
    if(p > best.v) best = { n: h, v: p };
    if(p < worst.v) worst = { n: h, v: p };

    row.innerHTML += `<div class="cell" style="font-weight:800;color:var(--accent)">${p}%</div>`;
    row.innerHTML += `<div class="cell delete" onclick="removeHabit('${h}')">✕</div>`;
    body.appendChild(row);
  });

  document.getElementById("overall").innerText = Math.round(totalP / (habits.length || 1)) + "%";
  document.getElementById("best").innerText = best.n;
  document.getElementById("worst").innerText = worst.n;
  yearly(y);
}

function yearly(y) {
  const box = document.getElementById("yearly");
  box.innerHTML = "";
  for(let m = 0; m < 12; m++) {
    let days = daysInMonth(y, m), sum = 0;
    habits.forEach(h => {
      let d = 0;
      for(let i = 1; i <= days; i++) if(localStorage.getItem(ukey(key(y, m, h, i))) === "true") d++;
      sum += d / days * 100;
    });
    box.innerHTML += `
      <div class="month-item">
        <label>${new Date(y, m).toLocaleString("default", { month: "short" })}</label>
        <b>${Math.round(sum / (habits.length || 1))}%</b>
      </div>`;
  }
}

yearSel.onchange = render;
monthSel.onchange = render;
render();

function exportCSV() {
  const y = +yearSel.value, m = +monthSel.value, days = daysInMonth(y, m);
  let csv = "Habit," + Array.from({ length: days }, (_, i) => i + 1).join(",") + "\n";
  habits.forEach(h => {
    csv += `"${h}"`;
    for(let d = 1; d <= days; d++) csv += localStorage.getItem(ukey(key(y, m, h, d))) === "true" ? ",✔" : ",";
    csv += "\n";
  });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([csv], { type: "text/csv" }));
  a.download = `habits-${y}-${m + 1}.csv`;
  a.click();
}

function toggleTheme() {
  const r = document.documentElement;
  r.dataset.theme = r.dataset.theme === "light" ? "dark" : "light";
  localStorage.setItem("theme", r.dataset.theme);
}
document.documentElement.dataset.theme = localStorage.getItem("theme") || "dark";

/* Register PWA Service Worker */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').then(() => console.log("Service Worker Registered"));
  });
}

let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('installBtnItem').style.display = 'flex';
});

async function showInstallPrompt() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    if (outcome === 'accepted') deferredPrompt = null;
  } else {
    alert("To install: Open browser menu -> Install or Add to Home Screen");
  }
}
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyDNoBvgu7W4txBT-nbnho_ILwU462bhlC4",
  authDomain: "habit-tracker-de698.firebaseapp.com",
  projectId: "habit-tracker-de698"
});
const auth = getAuth(app), db = getFirestore(app), provider = new GoogleAuthProvider();

async function syncToCloudInternal(key, value) {
  if (USER_KEY === "guest") return;
  try {
    await setDoc(doc(db, "users", USER_KEY), { [key]: { value, updatedAt: Date.now() } }, { merge: true });
  } catch (e) {
    console.error("Sync error:", e);
  }
}
window.syncToCloud = syncToCloudInternal;

const loginBtn = document.getElementById("loginBtn"), logoutBtn = document.getElementById("logoutBtn");
const userProfile = document.getElementById("userProfile"), userPic = document.getElementById("userPic"), userName = document.getElementById("userName");

loginBtn.onclick = () => signInWithPopup(auth, provider).catch(e => {
  if (e.code === 'auth/unauthorized-domain') alert("Authorize your domain in Firebase Console first.");
});
logoutBtn.onclick = () => signOut(auth);

let unsub = null;
onAuthStateChanged(auth, user => {
  if (unsub) unsub();
  if (user) {
    setUser(user.uid);
    loginBtn.style.display = "none"; logoutBtn.style.display = "block";
    userProfile.style.display = "flex"; userPic.src = user.photoURL; userName.textContent = user.displayName;
    
    unsub = onSnapshot(doc(db, "users", user.uid), snap => {
      const data = snap.data();
      if (!data) return;
      Object.keys(data).forEach(k => { if (data[k] && data[k].value !== undefined) localStorage.setItem(k, data[k].value) });
      habits = JSON.parse(localStorage.getItem(ukey("habit-list"))) || habits;
      render();
    });
  } else {
    setUser(null);
    loginBtn.style.display = "block"; logoutBtn.style.display = "none";
    userProfile.style.display = "none";
    render();
  }
});
</script>

</body>
</html>
