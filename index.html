<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<title>HABIT TRACKER</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0b0f14">

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

<link rel="icon" sizes="192x192" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="manifest" href="manifest.json">

<style>
:root {
  --bg: #0b0f14;
  --card: #141922;
  --rowA: #1a202c;
  --border: rgba(255, 255, 255, 0.08);
  --text: #ffffff;
  --muted: #94a3b8;
  --accent: #10b981;
  --accent-glow: rgba(16, 185, 129, 0.4);
  --danger: #ef4444;
  --glass: rgba(20, 25, 34, 0.85);
  --sticky-bg: rgba(20, 25, 34, 0.95);
  --font: 'Outfit', sans-serif;
}

[data-theme="light"] {
  --bg: #f1f5f9;
  --card: #ffffff;
  --rowA: #f8fafc;
  --border: #e2e8f0;
  --text: #1e293b;
  --muted: #64748b;
  --accent: #059669;
  --accent-glow: rgba(5, 150, 105, 0.2);
  --glass: rgba(255, 255, 255, 0.85);
  --sticky-bg: rgba(255, 255, 255, 0.95);
}

[data-theme="matrix"] {
  --bg: #000000;
  --card: rgba(0, 0, 0, 0.9);
  --rowA: rgba(0, 255, 65, 0.05);
  --border: #008f11;
  --text: #00ff41;
  --muted: #008f11;
  --accent: #00ff41;
  --accent-glow: 0 0 10px #00ff41;
  --danger: #ff0000;
  --glass: rgba(0, 0, 0, 0.85);
  --sticky-bg: rgba(0, 0, 0, 0.95);
  --font: 'JetBrains Mono', monospace;
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  margin: 0; padding: 0; height: 100%;
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  overflow-x: hidden;
  transition: background 0.3s, color 0.3s;
}

canvas#matrix-bg {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  z-index: -1; opacity: 0.12; display: none; pointer-events: none;
}
[data-theme="matrix"] canvas#matrix-bg { display: block; }

header {
  padding: env(safe-area-inset-top, 0) 24px 20px;
  background: var(--glass);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  position: sticky; top: 0; z-index: 500;
  display: flex; flex-direction: column; align-items: center;
  border-bottom: 1px solid var(--border);
}

header h1 {
  margin: 20px 0 10px; font-size: 26px; font-weight: 800; letter-spacing: -0.5px;
  text-shadow: var(--accent-glow);
}

.container { max-width: 1200px; margin: 0 auto; padding: 20px 16px 140px; display: flex; flex-direction: column; gap: 20px; }

#userProfile {
  display: none; align-items: center; gap: 10px; padding: 8px 12px;
  background: var(--border); border-radius: 50px; margin-top: 10px;
}
#userPic { width: 28px; height: 28px; border-radius: 50%; border: 1px solid var(--accent); }

/* Main Cards */
.card {
  background: var(--card); border: 1px solid var(--border); border-radius: 20px;
  padding: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.1);
}
[data-theme="matrix"] .card { border-radius: 0; }

.controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.controls input { grid-column: span 2; }

input, select, button {
  background: var(--rowA); color: var(--text); border: 1px solid var(--border);
  padding: 12px; border-radius: 12px; font-family: inherit; font-size: 15px;
}
[data-theme="matrix"] input, [data-theme="matrix"] select, [data-theme="matrix"] button { border-radius: 0; }

button { cursor: pointer; transition: all 0.2s; }
button.primary { background: var(--accent); color: black; font-weight: 800; border: none; grid-column: span 2; }
button.primary:disabled { opacity: 0.5; }

/* Dashboard */
.dashboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.stat { background: var(--rowA); padding: 12px; border-radius: 15px; text-align: center; border: 1px solid var(--border); }
.stat label { font-size: 11px; color: var(--muted); text-transform: uppercase; display: block; }
.stat span { font-size: 18px; font-weight: 800; color: var(--accent); display: block; margin-top: 5px; }

/* Grid Table */
.table-shell { padding: 0; overflow: hidden; }
.table-header-row { display: flex; padding: 15px 20px; border-bottom: 1px solid var(--border); }
.table-header-row h3 { margin: 0; font-size: 18px; color: var(--accent); }

.table-wrapper { overflow: auto; position: relative; -webkit-overflow-scrolling: touch; }
.grid { display: grid; grid-template-columns: 140px repeat(var(--days), 44px) 60px 48px; }

.table-header { background: var(--bg); position: sticky; top: 0; z-index: 200; border-bottom: 2px solid var(--border); }
.table-header div { padding: 12px 0; text-align: center; font-weight: 700; font-size: 12px; color: var(--muted); }

.row { border-bottom: 1px solid var(--border); }
.row:nth-child(even) { background: var(--rowA); }

.cell { padding: 6px; display: flex; align-items: center; justify-content: center; border-right: 1px solid var(--border); }

.cell.habit-name {
  justify-content: flex-start;
  position: sticky; left: 0; z-index: 250;
  background: var(--sticky-bg) !important;
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  padding-left: 15px; font-weight: 600; font-size: 13px;
  border-right: 2px solid var(--accent);
  box-shadow: 4px 0 10px rgba(0,0,0,0.2);
}

.box {
  width: 28px; height: 28px; border-radius: 8px; border: 1px solid var(--border);
  cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center;
}
.box.checked { background: var(--accent); box-shadow: 0 0 10px var(--accent-glow); }
.box.checked::after { content: "✓"; color: black; font-weight: 900; }
[data-theme="matrix"] .box.checked::after { content: "■"; }

/* Footer Nav */
.nav-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--glass); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  border-top: 1px solid var(--border);
  padding: 12px 16px calc(12px + env(safe-area-inset-bottom, 0));
  display: flex; justify-content: space-around; z-index: 600;
}
.nav-item { background: none; border: none; color: var(--muted); font-size: 11px; font-weight: 800; cursor: pointer; padding: 10px; min-height: auto; width: auto; }
.nav-item.active { color: var(--accent); }

@media (max-width: 600px) {
  .dashboard { grid-template-columns: 1fr; }
  .grid { grid-template-columns: 120px repeat(var(--days), 40px) 54px 44px; }
  .stat { flex-direction: row; display: flex; justify-content: space-between; align-items: center; }
  .stat span { margin-top: 0; }
}

</style>
</head>
<body onclick="playMatrixSound()">

<canvas id="matrix-bg"></canvas>

<header>
  <h1>HABIT TRACKER</h1>
  <div id="userProfile" style="display:none">
    <img id="userPic" alt="Profile"><span id="userName"></span>
  </div>
</header>

<div class="container">
  
  <div class="card dashboard">
    <div class="stat"><label>Efficiency</label><span id="overall">0%</span></div>
    <div class="stat"><label>Top Goal</label><span id="best">-</span></div>
    <div class="stat"><label>Focus Needed</label><span id="worst">-</span></div>
  </div>

  <div class="card table-shell">
    <div class="table-header-row"><h3>HABIT LOG</h3></div>
    <div class="table-wrapper">
      <div id="header" class="grid table-header"></div>
      <div id="body"></div>
    </div>
  </div>

  <div class="card">
    <div class="controls">
      <select id="year"></select>
      <select id="month"></select>
      <input id="newHabit" placeholder="Log new habit entry..." enterkeyhint="done">
      <button onclick="addHabit()" class="primary">COMMIT ENTRY</button>
      <button id="loginBtn">AUTH WITH GOOGLE</button>
      <button id="logoutBtn" style="display:none">DISCONNECT</button>
    </div>
  </div>

  <div class="card">
    <h3 style="margin-top:0; font-size: 14px; opacity:0.6">> DATA_INSIGHTS</h3>
    <div id="yearly" class="grid-layout" style="display:grid; grid-template-columns: repeat(4,1fr); gap:10px;"></div>
  </div>
</div>

<nav class="nav-bar">
  <button class="nav-item" onclick="window.scrollTo({top:0, behavior:'smooth'})">HOME</button>
  <button class="nav-item" onclick="nextTheme()" id="themeBtn">THEME: DARK</button>
  <button class="nav-item" onclick="exportCSV()">EXPORT</button>
  <button class="nav-item" onclick="showInstallPrompt()">SYNC APP</button>
</nav>

<script>
/* MATRIX AUDIO & SFX */
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playMatrixSound() {
  if (document.documentElement.getAttribute("data-theme") !== "matrix") return;
  if(audioCtx.state === 'suspended') audioCtx.resume();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'square';
  osc.frequency.setValueAtTime(440 + Math.random()*800, audioCtx.currentTime);
  gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start(); osc.stop(audioCtx.currentTime + 0.1);
}

/* THEME SWITCHER */
const themes = ["dark", "light", "matrix"];
let currentThemeIdx = themes.indexOf(localStorage.getItem("theme") || "dark");
if(currentThemeIdx<0) currentThemeIdx=0;

function applyTheme(idx) {
  const t = themes[idx];
  document.documentElement.setAttribute("data-theme", t);
  localStorage.setItem("theme", t);
  document.getElementById("themeBtn").innerText = `THEME: ${t.toUpperCase()}`;
  if(t === "matrix") startMatrix(); else stopMatrix();
}
function nextTheme() { currentThemeIdx = (currentThemeIdx+1)%3; applyTheme(currentThemeIdx); playMatrixSound(); }
applyTheme(currentThemeIdx);

/* MATRIX LOGIC */
const canvas = document.getElementById('matrix-bg'), ctx = canvas.getContext('2d');
let matrixInterval = null;
function startMatrix() {
  if(matrixInterval) return;
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  const chars = "0123456789ABCDEFHIJKLMNOPQRSTUVWXYZアイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン";
  const f = 16, drops = Array(Math.floor(canvas.width/f)).fill(1);
  matrixInterval = setInterval(() => {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.08)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#00ff41'; ctx.font = f + 'px monospace';
    drops.forEach((y, i) => {
      ctx.fillText(chars[Math.floor(Math.random()*chars.length)], i*f, y*f);
      if(y*f > canvas.height && Math.random() > 0.975) drops[i] = 0;
      drops[i]++;
    });
  }, 40);
}
function stopMatrix() { clearInterval(matrixInterval); matrixInterval = null; }

/* APP LOGIC */
let USER_KEY = "guest";
function setUser(uid) { USER_KEY = uid || "guest" }
function ukey(k) { return USER_KEY + "::" + k }

let habits = JSON.parse(localStorage.getItem(ukey("habit-list"))) || ["Exercise", "Water", "Reading", "Sleep", "Meditate"];

const yearSel = document.getElementById("year"), monthSel = document.getElementById("month");
const header = document.getElementById("header"), body = document.getElementById("body");

const now = new Date();
for(let y=now.getFullYear()-2; y<=now.getFullYear()+3; y++) {
  let o = document.createElement("option"); o.value=y; o.text=y; if(y===now.getFullYear())o.selected=true;
  yearSel.appendChild(o);
}
for(let m=0; m<12; m++) {
  let o = document.createElement("option"); o.value=m; o.text=new Date(0,m).toLocaleString('default',{month:'long'});
  if(m===now.getMonth())o.selected=true; monthSel.appendChild(o);
}

function daysInMonth(y, m) { return new Date(y, m+1, 0).getDate() }
function key(y, m, h, d) { return `${y}-${m}-${h}-${d}` }
function saveHabits() { localStorage.setItem(ukey("habit-list"), JSON.stringify(habits)) }

function addHabit() {
  const i = document.getElementById("newHabit"); if(!i.value.trim()) return;
  habits.push(i.value.trim()); saveHabits();
  if(window.syncToCloud) syncToCloud(ukey("habit-list"), JSON.stringify(habits));
  i.value = ""; render();
}

function removeHabit(h) { if(!confirm(`Delete ${h}?`)) return; habits=habits.filter(x=>x!==h); saveHabits(); render(); }

function toggle(h, d) {
  const y = +yearSel.value, m = +monthSel.value, k = key(y,m,h,d);
  const v = localStorage.getItem(ukey(k)) !== "true";
  localStorage.setItem(ukey(k), v); if(window.syncToCloud) syncToCloud(ukey(k), v);
  render();
}

function render() {
  const y = +yearSel.value, m = +monthSel.value, dInM = daysInMonth(y,m), t = new Date();
  header.style.setProperty("--days", dInM); body.style.setProperty("--days", dInM);
  header.innerHTML = "<div>Habit</div>"; for(let d=1; d<=dInM; d++) header.innerHTML += `<div>${d}</div>`;
  header.innerHTML += "<div>%</div><div>🗑</div>";
  let totalP = 0, best = {n:"-", v:-1}, worst = {n:"-", v:101}; body.innerHTML = "";
  habits.forEach(h => {
    let done = 0; const row = document.createElement("div"); row.className="grid row";
    row.innerHTML = `<div class="cell habit-name">${h}</div>`;
    for(let d=1; d<=dInM; d++) {
      const c = localStorage.getItem(ukey(key(y,m,h,d))) === "true"; if(c) done++;
      row.innerHTML += `<div class="cell"><div class="box ${c?'checked':''}" onclick="toggle('${h}', ${d}); playMatrixSound()"></div></div>`;
    }
    const p = Math.round(done/dInM*100); totalP += p;
    if(p>best.v) best={n:h,v:p}; if(p<worst.v) worst={n:h,v:p};
    row.innerHTML += `<div class="cell" style="font-weight:800;color:var(--accent)">${p}%</div><div class="cell" onclick="removeHabit('${h}')">✕</div>`;
    body.appendChild(row);
  });
  document.getElementById("overall").innerText = Math.round(totalP/(habits.length||1))+"%";
  document.getElementById("best").innerText = best.n; document.getElementById("worst").innerText = worst.n;
  yearly(y);
}

function yearly(y) {
  const box = document.getElementById("yearly"); box.innerHTML = "";
  for(let m=0; m<12; m++) {
    let dInM = daysInMonth(y,m), sum = 0;
    habits.forEach(h => {
      let d=0; for(let i=1; i<=dInM; i++) if(localStorage.getItem(ukey(key(y,m,h,i)))==="true")d++;
      sum += d/dInM*100;
    });
    box.innerHTML += `<div style="text-align:center; padding:5px; border:1px solid var(--border); border-radius:10px;">
      <div style="font-size:10px; color:var(--muted)">${new Date(0,m).toLocaleString('default',{month:'short'})}</div>
      <b style="color:var(--accent); font-size:12px;">${Math.round(sum/(habits.length||1))}%</b>
    </div>`;
  }
}
yearSel.onchange=monthSel.onchange=render; render();

function exportCSV() {
  const y=+yearSel.value, m=+monthSel.value, dInM=daysInMonth(y,m);
  let csv = "Habit," + Array.from({length:dInM},(_,i)=>i+1).join(",") + "\n";
  habits.forEach(h => {
    csv += `"${h}"`; for(let d=1; d<=dInM; d++) csv += localStorage.getItem(ukey(key(y,m,h,d)))==="true"?",✔":",";
    csv += "\n";
  });
  const a = document.createElement("a"); a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download=`habits-${y}-${m+1}.csv`; a.click();
}

/* PWA */
if('serviceWorker' in navigator) { window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js')); }
let defP; window.addEventListener('beforeinstallprompt',(e)=>{ e.preventDefault(); defP=e; });
function showInstallPrompt(){ if(defP) defP.prompt(); else alert("Use browser menu to install"); }
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyDNoBvgu7W4txBT-nbnho_ILwU462bhlC4",
  authDomain: "habit-tracker-de698.firebaseapp.com",
  projectId: "habit-tracker-de698"
});
const auth = getAuth(app), db = getFirestore(app), provider = new GoogleAuthProvider();

window.syncToCloud = async (k, v) => {
  if (USER_KEY === "guest") return;
  try { await setDoc(doc(db,"users",USER_KEY),{[k]:{value:v, updatedAt:Date.now()}},{merge:true}); } 
  catch(e) { console.error("Sync fail", e); }
};

const loginBtn = document.getElementById("loginBtn"), logoutBtn = document.getElementById("logoutBtn");
const prof = document.getElementById("userProfile"), pic = document.getElementById("userPic"), name = document.getElementById("userName");

loginBtn.onclick = () => {
  loginBtn.disabled = true; loginBtn.innerText = "AUTHENTICATING...";
  signInWithPopup(auth, provider).catch(e => {
    loginBtn.disabled = false; loginBtn.innerText = "AUTH WITH GOOGLE";
    if(e.code === 'auth/unauthorized-domain') alert("Authorize: "+window.location.host+" in Firebase.");
    else alert("Login Error: " + e.message);
  });
};
logoutBtn.onclick = () => signOut(auth);

let unsub = null;
onAuthStateChanged(auth, user => {
  if(unsub) unsub();
  if(user) {
    setUser(user.uid); loginBtn.style.display="none"; logoutBtn.style.display="block";
    prof.style.display="flex"; pic.src=user.photoURL; name.textContent=user.displayName;
    unsub = onSnapshot(doc(db,"users",user.uid), snap => {
      const data = snap.data(); if (!data) return;
      Object.keys(data).forEach(k => { if (data[k] && data[k].value!==undefined) localStorage.setItem(k, data[k].value) });
      habits = JSON.parse(localStorage.getItem(ukey("habit-list"))) || habits;
      render();
    });
  } else {
    setUser(null); loginBtn.style.display="block"; loginBtn.disabled=false; loginBtn.innerText="AUTH WITH GOOGLE";
    logoutBtn.style.display="none"; prof.style.display="none"; render();
  }
});
</script>

</body>
</html>
