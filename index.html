<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
 <meta charset="UTF-8">
 <title>HABIT TRACKER</title>
 <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
 <meta name="apple-mobile-web-app-capable" content="yes">
 <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
 <meta name="theme-color" content="#0b0f14">

 <!-- Fonts -->
 <link rel="preconnect" href="https://fonts.googleapis.com">
 <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
 <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

 <link rel="manifest" href="manifest.json">
 <style>
  :root {
   --bg: #0b0f14;
   --card: #141922;
   --rowA: #1a202c;
   --border: rgba(255, 255, 255, 0.08);
   --text: #ffffff;
   --muted: #94a3b8;
   --accent: #10b981;
   --accent-glow: rgba(16, 185, 129, 0.4);
   --danger: #ef4444;
   --sticky-bg: #141922;
   --font: 'Outfit', sans-serif;
  }

  [data-theme="light"] {
   --bg: #f8fafc;
   --card: #ffffff;
   --rowA: #f1f5f9;
   --border: #e2e8f0;
   --text: #1e293b;
   --muted: #64748b;
   --accent: #059669;
   --accent-glow: rgba(5, 150, 105, 0.2);
   --sticky-bg: #ffffff;
  }

  [data-theme="matrix"] {
   --bg: #000000;
   --card: #000000;
   --rowA: rgba(0, 255, 65, 0.05);
   --border: #008f11;
   --text: #00ff41;
   --muted: #008f11;
   --accent: #00ff41;
   --accent-glow: 0 0 10px #00ff41;
   --sticky-bg: #000000;
   --font: 'JetBrains Mono', monospace;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
   margin: 0; padding: 0;
   font-family: var(--font);
   background: var(--bg);
   color: var(--text);
   transition: background 0.3s;
  }

  canvas#matrix-bg {
   position: fixed; top: 0; left: 0; width: 100%; height: 100%;
   z-index: -1; opacity: 0.18; display: none; pointer-events: none;
  }
  [data-theme="matrix"] canvas#matrix-bg { display: block; }

  header {
   padding: env(safe-area-inset-top, 0) 24px 20px;
   background: var(--card);
   position: sticky; top: 0; z-index: 500;
   display: flex; flex-direction: column; align-items: center;
   border-bottom: 1px solid var(--border);
  }

  h1 { margin: 20px 0 10px; font-size: 24px; font-weight: 800; letter-spacing: -1px; }

  .container { max-width: 1200px; margin: 0 auto; padding: 24px 16px 140px; display: flex; flex-direction: column; gap: 20px; }

  .card {
   background: var(--card); border: 1px solid var(--border); border-radius: 20px;
   padding: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.1);
  }
  [data-theme="matrix"] .card { border-radius: 0; }

  .dashboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .stat { background: var(--rowA); padding: 12px; border-radius: 15px; text-align: center; border: 1px solid var(--border); }
  .stat label { font-size: 10px; opacity: 0.6; text-transform: uppercase; display: block; }
  .stat span { font-size: 18px; font-weight: 800; color: var(--accent); }

  .table-shell { padding: 0; overflow: hidden; }
  .table-wrapper { overflow: auto; position: relative; -webkit-overflow-scrolling: touch; }
  .grid { display: grid; grid-template-columns: 140px repeat(var(--days), 44px) 60px 48px; }

  .table-header { background: var(--bg); position: sticky; top: 0; z-index: 400; border-bottom: 2px solid var(--border); }
  .table-header div { padding: 12px 0; text-align: center; font-weight: 700; font-size: 12px; }

  .row { border-bottom: 1px solid var(--border); }
  .row:nth-child(even) { background: var(--rowA); }

  .cell { padding: 8px; display: flex; align-items: center; justify-content: center; border-right: 1px solid var(--border); }

  /* FIX: Solid sticky column labels */
  .cell.habit {
   justify-content: flex-start;
   position: sticky; left: 0; z-index: 1000;
   background: var(--sticky-bg) !important;
   opacity: 1 !important;
   padding-left: 15px; font-weight: 700; font-size: 13px;
   border-right: 3px solid var(--accent);
   box-shadow: 8px 0 12px rgba(0,0,0,0.4);
   width: 140px; min-width: 140px;
  }

  .box {
   width: 28px; height: 28px; border-radius: 8px; border: 1px solid var(--border);
   cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center;
  }
  .box.checked { background: var(--accent); border-color: var(--accent); }
  .box.checked::after { content: "✓"; color: #000; font-weight: 900; }
  [data-theme="matrix"] .box.checked::after { content: "■"; color: #000; }

  .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .controls input { grid-column: span 2; }

  input, select, button {
   padding: 12px; border: 1px solid var(--border); border-radius: 12px;
   background: var(--rowA); color: var(--text); font-family: inherit; font-size: 14px;
  }
  button { background: var(--accent); color: #000; border: none; font-weight: 800; cursor: pointer; }

  .yearly-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
  .month-box { background: var(--rowA); padding: 8px; border-radius: 12px; text-align: center; border: 1px solid var(--border); }

  .nav-bar {
   position: fixed; bottom: 0; left: 0; right: 0;
   background: var(--card); border-top: 1px solid var(--border); padding: 12px;
   display: flex; justify-content: space-around; z-index: 1100;
  }
  .nav-item { background: none; border: none; color: var(--muted); font-size: 11px; font-weight: 800; cursor: pointer; min-height: auto; }

  @media (max-width: 600px) {
   .dashboard { grid-template-columns: 1fr; }
   .grid { grid-template-columns: 120px repeat(var(--days), 40px) 54px 44px; }
   .cell.habit { width: 120px; min-width: 120px; }
   .yearly-grid { grid-template-columns: repeat(3, 1fr); }
  }
 </style>
</head>
<body>
 <canvas id="matrix-bg"></canvas>
 <header>
  <h1>HABIT TRACKER</h1>
  <div id="userProfile" style="display:none; align-items:center; gap:10px; margin-top:5px;">
   <img id="userPic" style="width:24px; border-radius:50%; border:1px solid var(--accent)">
   <span id="userName" style="font-size:11px; font-weight:700"></span>
  </div>
 </header>
 <div class="container" id="app">
  <div class="card dashboard">
   <div class="stat"><label>Efficiency</label><span id="overall">0%</span></div>
   <div class="stat"><label>Top Goal</label><span id="best">-</span></div>
   <div class="stat"><label>Focus Need</label><span id="worst">-</span></div>
  </div>
  <div class="card table-shell">
   <div class="table-wrapper">
    <div id="header" class="grid table-header"></div>
    <div id="body"></div>
   </div>
  </div>
  <div class="card controls">
   <select id="year"></select>
   <select id="month"></select>
   <input type="text" id="newHabit" placeholder="Log new action...">
   <button onclick="addHabit()" style="grid-column: span 2;">INSERT RITUAL</button>
  </div>
  <div class="card">
   <h3 style="margin-top:0; font-size: 14px; opacity:0.6">> DATA_OVERVIEW</h3>
   <div id="yearly" class="yearly-grid"></div>
  </div>
 </div>

 <nav class="nav-bar">
   <button class="nav-item" id="loginBtn">AUTH</button>
   <button class="nav-item" id="logoutBtn" style="display:none">OFF</button>
   <button class="nav-item" onclick="toggleTheme()" id="themeBtn">THEME: DARK</button>
   <button class="nav-item" onclick="exportCSV()">CSV</button>
   <button class="nav-item" id="installBtn">SYNC</button>
 </nav>

 <script>
/* STABLE LOGIC START */
let USER_KEY="guest";
function setUser(uid){USER_KEY=uid||"guest"}
function ukey(k){return USER_KEY+"::"+k}

let habits=JSON.parse(localStorage.getItem(ukey("habit-list"))) || ["Exercise","Water","Reading","Sleep","Meditation"];

const yearSel=document.getElementById("year"), monthSel=document.getElementById("month");
const header=document.getElementById("header"), body=document.getElementById("body");

const now=new Date();
for(let y=2024;y<=2030;y++){
 let o=document.createElement("option"); o.value=y; o.text=y;
 if(y===now.getFullYear())o.selected=true; yearSel.appendChild(o);
}
for(let m=0;m<12;m++){
 let o=document.createElement("option"); o.value=m; 
 o.text=new Date(0,m).toLocaleString("default",{month:"long"});
 if(m===now.getMonth())o.selected=true; monthSel.appendChild(o);
}

function daysInMonth(y,m){return new Date(y,m+1,0).getDate()}
function key(y,m,h,d){return `${y}-${m}-${h}-${d}`}
function isTodayCell(y,m,d){
 const t=new Date(); return y===t.getFullYear() && m===t.getMonth() && d===t.getDate();
}

function saveHabits(){ localStorage.setItem(ukey("habit-list"),JSON.stringify(habits)); }

function addHabit(){
 const i=document.getElementById("newHabit"); if(!i.value.trim())return;
 habits.push(i.value.trim()); saveHabits();
 if(window.syncToCloud) syncToCloud(ukey("habit-list"), JSON.stringify(habits));
 i.value=""; render();
}

function removeHabit(h){
 if(!confirm(`Delete "${h}"?`))return;
 habits=habits.filter(x=>x!==h); saveHabits();
 if(window.syncToCloud) syncToCloud(ukey("habit-list"), JSON.stringify(habits));
 render();
}

function toggle(h,d){
 const y=+yearSel.value, m=+monthSel.value, k=key(y,m,h,d);
 const v=localStorage.getItem(ukey(k))!=="true";
 localStorage.setItem(ukey(k), v);
 if(window.syncToCloud) syncToCloud(ukey(k), v);
 render();
}

function render(){
 const y=+yearSel.value, m=+monthSel.value, days=daysInMonth(y,m);
 header.style.setProperty("--days",days);
 body.style.setProperty("--days",days);
 header.innerHTML="<div>Habit</div>";
 for(let d=1;d<=days;d++) header.innerHTML+=`<div class="${isTodayCell(y,m,d)?"today":""}">${d}</div>`;
 header.innerHTML+="<div>%</div><div>🗑️</div>";
 body.innerHTML="";
 let total=0, best={n:"-",v:-1}, worst={n:"-",v:101};
 habits.forEach(h=>{
  let done=0; const row=document.createElement("div"); row.className="grid row";
  row.innerHTML=`<div class="cell habit">${h}</div>`;
  for(let d=1;d<=days;d++){
   const c=localStorage.getItem(ukey(key(y,m,h,d)))==="true"; if(c)done++;
   row.innerHTML+=`<div class="cell ${isTodayCell(y,m,d)?"today":""}"><div class="box ${c?"checked":""}" onclick="toggle('${h}',${d})"></div></div>`;
  }
  const p=Math.round(done/days*100); total+=p;
  if(p>best.v)best={n:h,v:p}; if(p<worst.v)worst={n:h,v:p};
  row.innerHTML+=`<div class="cell" style="font-weight:800;color:var(--accent)">${p}%</div><div class="cell delete" onclick="removeHabit('${h}')">✕</div>`;
  body.appendChild(row);
 });
 document.getElementById("overall").innerText=Math.round(total/(habits.length||1))+"%";
 document.getElementById("best").innerText=best.n; document.getElementById("worst").innerText=worst.n;
 yearly(y);
}

function yearly(y){
 const box=document.getElementById("yearly"); box.innerHTML="";
 for(let m=0;m<12;m++){
  let dInM=daysInMonth(y,m), sum=0;
  habits.forEach(h=>{
   let d=0; for(let i=1;i<=dInM;i++) if(localStorage.getItem(ukey(key(y,m,h,i)))==="true")d++;
   sum+=d/dInM*100;
  });
  box.innerHTML+=`<div class="month-box"><label>${new Date(y,m).toLocaleString("default",{month:"short"})}</label><br><b>${Math.round(sum/(habits.length||1))}%</b></div>`;
 }
}
yearSel.onchange=monthSel.onchange=render; render();

function exportCSV(){
 const y=+yearSel.value, m=+monthSel.value, days=daysInMonth(y,m);
 let csv="Habit,"+Array.from({length:days},(_,i)=>i+1).join(",")+"\n";
 habits.forEach(h=>{
  csv+=`"${h}"`;
  for(let d=1;d<=days;d++) csv+=localStorage.getItem(ukey(key(y,m,h,d)))==="true"?",✔":",";
  csv+="\n";
 });
 const a=document.createElement("a");
 a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));
 a.download=`habits-${y}-${m+1}.csv`; a.click();
}

const themes = ["dark", "light", "matrix"];
let tIdx = themes.indexOf(localStorage.getItem("theme")||"dark");
if(tIdx<0) tIdx=0;

function toggleTheme(){
 tIdx=(tIdx+1) % themes.length;
 applyTheme(tIdx);
}
function applyTheme(idx){
 const t=themes[idx];
 document.documentElement.setAttribute("data-theme",t);
 localStorage.setItem("theme",t);
 document.getElementById("themeBtn").innerText=`MODE: ${t.toUpperCase()}`;
 if(t==="matrix") startMatrix(); else stopMatrix();
}
applyTheme(tIdx);

const canvas = document.getElementById('matrix-bg'), ctx = canvas.getContext('2d');
let matrixInterval = null;
function startMatrix() {
 if(matrixInterval) return;
 canvas.width = window.innerWidth; canvas.height = window.innerHeight;
 const chars = "0123456789ABCDEFHIJKLMNOPQRSTUVWXYZアイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン";
 const f = 16, drops = Array(Math.floor(canvas.width/f)).fill(1);
 const colors = ["#00ff41", "#00e5ff", "#008f11", "#059669"];
 matrixInterval = setInterval(() => {
  ctx.fillStyle = 'rgba(0, 0, 0, 0.08)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
  drops.forEach((y, i) => {
   ctx.fillStyle = colors[Math.floor(Math.random()*colors.length)];
   ctx.font = f + 'px monospace';
   ctx.fillText(chars[Math.floor(Math.random()*chars.length)], i*f, y*f);
   if(y*f > canvas.height && Math.random() > 0.975) drops[i] = 0;
   drops[i]++;
  });
 }, 45);
}
function stopMatrix() { clearInterval(matrixInterval); matrixInterval = null; }
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth,GoogleAuthProvider,signInWithPopup,signOut,onAuthStateChanged }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore,doc,setDoc,onSnapshot }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app=initializeApp({
 apiKey:"AIzaSyDNoBvgu7W4txBT-nbnho_ILwU462bhlC4",
 authDomain:"habit-tracker-de698.firebaseapp.com",
 projectId:"habit-tracker-de698"
});
const auth=getAuth(app), db=getFirestore(app), provider=new GoogleAuthProvider();

async function syncToCloudInternal(key, value) {
 if (USER_KEY === "guest") return;
 try {
  await setDoc(doc(db,"users",USER_KEY),{[key]:{value:value, updatedAt:Date.now()}},{merge:true});
 } catch (e) { console.error("Sync Error:", e); }
}
window.syncToCloud = syncToCloudInternal;

const loginBtn=document.getElementById("loginBtn"), logoutBtn=document.getElementById("logoutBtn");
const userProfile=document.getElementById("userProfile"), userPic=document.getElementById("userPic"), userName=document.getElementById("userName");

loginBtn.onclick=()=>signInWithPopup(auth,provider);
logoutBtn.onclick=()=>signOut(auth);

let unsub=null;
onAuthStateChanged(auth,user=>{
 if(unsub)unsub();
 if(user){
  setUser(user.uid); loginBtn.style.display="none"; logoutBtn.style.display="inline-block";
  userProfile.style.display="flex"; userPic.src=user.photoURL; userName.textContent=user.displayName||user.email;
  unsub=onSnapshot(doc(db,"users",user.uid),snap=>{
   const data=snap.data(); if(!data) return;
   Object.keys(data).forEach(k => { if (data[k] && data[k].value !== undefined) localStorage.setItem(k, data[k].value) });
   habits=JSON.parse(localStorage.getItem(ukey("habit-list")))||habits;
   render();
  });
 }else{
  setUser(null); loginBtn.style.display="inline-block"; logoutBtn.style.display="none";
  userProfile.style.display="none"; render();
 }
});
</script>

<script>
let deferredPrompt = null;
const installBtn = document.getElementById("installBtn");
window.addEventListener("beforeinstallprompt", (e) => { e.preventDefault(); deferredPrompt = e; });
installBtn.addEventListener("click", async () => {
 if(!deferredPrompt) { alert("Use browser menu → Install"); return; }
 deferredPrompt.prompt(); await deferredPrompt.userChoice; deferredPrompt = null;
});
</script>
</body>
</html>
