<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HABIT TRACKER</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">

<link rel="icon" sizes="192x192" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0b0f14">

<style>
:root{
  --bg:#0b0f14;
  --card:#141922;
  --rowA:#161c26;
  --rowB:#121722;
  --border:#2a3244;
  --text:#ffffff;
  --muted:#9aa4b2;
  --accent:#00e676;
  --danger:#ff4d4d;
}

:root[data-theme="light"]{
  --bg:#f4f6fb;
  --card:#ffffff;
  --rowA:#f0f2f8;
  --rowB:#ffffff;
  --border:#dcdcdc;
  --text:#000000;
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}

html{scroll-behavior:smooth}

body{
  margin:0;
  font-family:Inter,Segoe UI,Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
  padding-bottom:env(safe-area-inset-bottom,0);
}

header{
  padding:18px;
  padding-top:calc(18px + env(safe-area-inset-top,0));
  text-align:center;
  font-size:22px;
  font-weight:800;
  background:linear-gradient(135deg,#141e30,#243b55);
  position:sticky;
  top:0;
  z-index:100;
}

.container{
  max-width:1600px;
  margin:auto;
  padding:16px;
  display:grid;
  gap:16px;
  padding-bottom:80px;
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:16px;
  padding:16px;
}

.controls{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  align-items:center;
}

input,select,button{
  background:#1b2230;
  color:var(--text);
  border:1px solid var(--border);
  padding:10px 14px;
  border-radius:10px;
  font-size:15px;
  min-height:44px;
}

button{cursor:pointer}
button:hover{opacity:.85}

/* Dashboard */
.dashboard{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:14px;
}

.stat{
  background:#1b2230;
  border-radius:14px;
  padding:16px;
}

.stat span{
  display:block;
  margin-top:6px;
  font-size:22px;
  font-weight:800;
}

/* Table */
.table-shell{
  border-radius:16px;
  border:1px solid var(--border);
  overflow:auto;
  max-height:450px;
  -webkit-overflow-scrolling:touch;
}

.table-wrapper{min-width:max-content}

.grid{
  display:grid;
  grid-template-columns:
    240px
    repeat(var(--days), 44px)
    70px
    60px;
}

.table-header{
  position:sticky;
  top:0;
  z-index:10;
  background:#1b2230;
}

.table-header div{
  padding:10px;
  text-align:center;
  border-right:1px solid var(--border);
  font-weight:700;
}

.row:nth-child(even){background:var(--rowA)}
.row:nth-child(odd){background:var(--rowB)}

.cell{
  padding:8px;
  text-align:center;
  border-right:1px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:center;
}

.habit{
  font-weight:700;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.box{
  width:28px;
  height:28px;
  border-radius:8px;
  background:#2a3344;
  cursor:pointer;
  transition:transform 0.1s;
}
.box:active{transform:scale(0.9)}

.box.checked{
  background:var(--accent);
  box-shadow:0 0 6px #00e67688;
}

.delete{
  cursor:pointer;
  color:var(--muted);
}

.delete:hover{color:var(--danger)}

.today{
  background:rgba(0,230,118,0.18)!important;
}

/* Yearly */
.yearly{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(90px,1fr));
  gap:10px;
}

.month-box{
  background:#1b2230;
  border-radius:12px;
  padding:10px;
  text-align:center;
}

/* MOBILE ADAPTATIONS */
@media (max-width: 768px){
  .container{padding:10px; gap:10px; padding-bottom:100px;}
  .controls{flex-direction:column; align-items:stretch;}
  .controls input, .controls select, .controls button{width:100%;}
  .desktop-only{display:none !important;}
  .grid{grid-template-columns:140px repeat(var(--days), 40px) 60px 44px;}
  .box{width:30px; height:30px;}
  .dashboard{grid-template-columns:1fr;}
  #userProfile{margin-left:0 !important; justify-content:center;}
}

/* Bottom mobile bar */
.mobile-bar{
  display:none;
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:linear-gradient(135deg,#141e30,#243b55);
  border-top:1px solid var(--border);
  padding:10px;
  padding-bottom:calc(10px + env(safe-area-inset-bottom,0));
  z-index:200;
  justify-content:space-around;
  gap:10px;
}
.mobile-bar button{flex:1; font-size:18px; background:rgba(255,255,255,0.1); border:none;}

@media (max-width: 768px){ .mobile-bar{display:flex;} }

:root[data-theme="light"] .mobile-bar{background:#e3e7f0; border-top:1px solid #ccc;}
:root[data-theme="light"] .mobile-bar button{background:rgba(0,0,0,0.05); color:#000;}

/* ================= LIGHT THEME VISIBILITY FIX ================= */
:root[data-theme="light"] body{color:#111;}
:root[data-theme="light"] header{background:linear-gradient(135deg,#e3e7f0,#cfd8ea); color:#000;}
:root[data-theme="light"] .card, :root[data-theme="light"] .stat, :root[data-theme="light"] .table-header, :root[data-theme="light"] .month-box{background:#ffffff; color:#000;}
:root[data-theme="light"] .row:nth-child(even){background:#f0f2f8;}
:root[data-theme="light"] .row:nth-child(odd){background:#ffffff;}
:root[data-theme="light"] input, :root[data-theme="light"] select, :root[data-theme="light"] button{background:#ffffff; color:#000; border:1px solid #ccc;}
:root[data-theme="light"] .box{background:#d0d4e0;}
:root[data-theme="light"] .today{background:rgba(0,230,118,0.25)!important;}

/* STICKY COLUMN */
.row .cell:first-child, .table-header div:first-child{
  position:sticky; left:0; z-index:50; background:var(--card);
}
:root[data-theme="light"] .row .cell:first-child, :root[data-theme="light"] .table-header div:first-child{background:#ffffff;}

.row .cell:first-child::after, .table-header div:first-child::after{
  content:""; position:absolute; top:0; right:0; width:1px; height:100%; background:rgba(0,0,0,0.1);
}

</style>
</head>

<body>

<header>HABIT TRACKER</header>

<div class="container">

<!-- CONTROLS -->
<div class="card controls">
  <select id="year"></select>
  <select id="month"></select>
  <input id="newHabit" placeholder="Add new habit">
  <button onclick="addHabit()">Add</button>

  <!-- Enhancements -->
  <button class="desktop-only" onclick="exportCSV()">Export CSV</button>
  <button class="desktop-only" onclick="toggleTheme()">🌗</button>
  <button class="desktop-only" onclick="enableReminder()">🔔</button>
  <button class="desktop-only" id="installBtn">📲 Install App</button>

  <!-- Auth -->
  <button id="loginBtn">Login</button>
  <button id="logoutBtn" style="display:none">Logout</button>

  <div id="userProfile" style="display:none;align-items:center;gap:8px;margin-left:auto">
    <img id="userPic" style="width:32px;height:32px;border-radius:50%">
    <span id="userName" style="font-size:13px;color:#9aa4b2"></span>
  </div>
</div>

<!-- DASHBOARD -->
<div class="card dashboard">
  <div class="stat">📈 Overall<span id="overall">0%</span></div>
  <div class="stat">🏆 Best<span id="best">-</span></div>
  <div class="stat">⚠️ Weakest<span id="worst">-</span></div>
</div>

<!-- TABLE -->
<div class="card table-shell">
  <div class="table-wrapper">
    <div id="header" class="grid table-header"></div>
    <div id="body"></div>
  </div>
</div>

<!-- YEARLY -->
<div class="card">
  <h3>📆 Yearly Overview</h3>
  <div id="yearly" class="yearly"></div>
</div>

</div>

<!-- MOBILE BAR -->
<div class="mobile-bar">
  <button onclick="toggleTheme()">🌗</button>
  <button onclick="exportCSV()">📤</button>
  <button onclick="enableReminder()">🔔</button>
  <button onclick="document.getElementById('installBtn').click()">📲</button>
</div>

<!-- ================= EXISTING CORE LOGIC (UNCHANGED) ================= -->
<script>
/* USER STORAGE */
let USER_KEY="guest";
function setUser(uid){USER_KEY=uid||"guest"}
function ukey(k){return USER_KEY+"::"+k}

/* HABITS */
let habits=JSON.parse(localStorage.getItem(ukey("habit-list")))||[
 "Daily Exercise","Drink 2L Water","Read 10 Pages",
 "Sleep Before 11 PM","Meditation","No Junk Food","Work on Goals"
];

const yearSel=document.getElementById("year");
const monthSel=document.getElementById("month");
const header=document.getElementById("header");
const body=document.getElementById("body");

const now=new Date();
const currentYear=now.getFullYear();

/* Year / Month init */
for(let y=currentYear-5;y<=currentYear+10;y++){
 let o=document.createElement("option");
 o.value=y;o.text=y;
 if(y===currentYear)o.selected=true;
 yearSel.appendChild(o);
}

for(let m=0;m<12;m++){
 let o=document.createElement("option");
 o.value=m;
 o.text=new Date(2025,m).toLocaleString("default",{month:"long"});
 if(m===now.getMonth())o.selected=true;
 monthSel.appendChild(o);
}

function daysInMonth(y,m){return new Date(y,m+1,0).getDate()}
function key(y,m,h,d){return `${y}-${m}-${h}-${d}`}

function isTodayCell(y,m,d){
 const t=new Date();
 return y===t.getFullYear() && m===t.getMonth() && d===t.getDate();
}

function saveHabits(){
 localStorage.setItem(ukey("habit-list"),JSON.stringify(habits));
}

function addHabit(){
 const i=document.getElementById("newHabit");
 if(!i.value.trim())return;
 habits.push(i.value.trim());
 saveHabits();
syncToCloud(ukey("habit-list"), JSON.stringify(habits));
i.value="";
render();

}

function removeHabit(h){
 if(!confirm(`Delete "${h}"?`))return;
 habits=habits.filter(x=>x!==h);
 saveHabits();
syncToCloud(ukey("habit-list"), JSON.stringify(habits));
render();
;
}

function toggle(h,d){
 const y=+yearSel.value;
 const m=+monthSel.value;
 const k=key(y,m,h,d);
const newValue = localStorage.getItem(ukey(k)) !== "true";
localStorage.setItem(ukey(k), newValue);
syncToCloud(ukey(k), newValue);
render();

}

/* RENDER */
function render(){
 const y=+yearSel.value;
 const m=+monthSel.value;
 const days=daysInMonth(y,m);

 header.style.setProperty("--days",days);
 body.style.setProperty("--days",days);
 header.innerHTML="";
 body.innerHTML="";

 header.innerHTML+="<div>Habit</div>";
 for(let d=1;d<=days;d++){
  header.innerHTML+=`<div class="${isTodayCell(y,m,d)?"today":""}">${d}</div>`;
 }
 header.innerHTML+="<div>%</div><div>🗑️</div>";

 let best={n:"-",v:-1}, worst={n:"-",v:101}, total=0;

 habits.forEach(h=>{
  let done=0;
  const row=document.createElement("div");
  row.className="grid row";
  row.style.setProperty("--days",days);
  row.innerHTML+=`<div class="cell habit">${h}</div>`;

  for(let d=1;d<=days;d++){
   const c=localStorage.getItem(ukey(key(y,m,h,d)))==="true";
   if(c)done++;
   row.innerHTML+=`
    <div class="cell ${isTodayCell(y,m,d)?"today":""}">
      <div class="box ${c?"checked":""}" onclick="toggle('${h}',${d})"></div>
    </div>`;
  }

  const p=Math.round(done/days*100);
  total+=p;
  if(p>best.v)best={n:h,v:p};
  if(p<worst.v)worst={n:h,v:p};

  row.innerHTML+=`<div class="cell">${p}%</div>`;
  row.innerHTML+=`<div class="cell delete" onclick="removeHabit('${h}')">🗑️</div>`;
  body.appendChild(row);
 });

 document.getElementById("overall").innerText=Math.round(total/habits.length)+"%";
 document.getElementById("best").innerText=best.n;
 document.getElementById("worst").innerText=worst.n;
 yearly(y);
}

function yearly(y){
 const box=document.getElementById("yearly");
 box.innerHTML="";
 for(let m=0;m<12;m++){
  let days=daysInMonth(y,m), sum=0;
  habits.forEach(h=>{
   let d=0;
   for(let i=1;i<=days;i++)
    if(localStorage.getItem(ukey(key(y,m,h,i)))==="true")d++;
   sum+=d/days*100;
  });
  box.innerHTML+=`
   <div class="month-box">
    ${new Date(y,m).toLocaleString("default",{month:"short"})}<br>
    <b>${Math.round(sum/habits.length)}%</b>
   </div>`;
 }
}

yearSel.onchange=render;
monthSel.onchange=render;
render();

/* EXPORT CSV */
function exportCSV(){
 const y=+yearSel.value;
 const m=+monthSel.value;
 const days=daysInMonth(y,m);
 let csv="Habit";
 for(let d=1;d<=days;d++)csv+=`,`+d;
 csv+="\n";
 habits.forEach(h=>{
  csv+=`"${h}"`;
  for(let d=1;d<=days;d++){
   csv+=localStorage.getItem(ukey(key(y,m,h,d)))==="true"?",✔":"";
  }
  csv+="\n";
 });
 const a=document.createElement("a");
 a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));
 a.download=`habits-${y}-${m+1}.csv`;
 a.click();
}

/* THEME */
function toggleTheme(){
 const r=document.documentElement;
 r.dataset.theme=r.dataset.theme==="light"?"dark":"light";
 localStorage.setItem("theme",r.dataset.theme);
}
document.documentElement.dataset.theme=localStorage.getItem("theme")||"dark";

/* REMINDER */
function enableReminder(){
 Notification.requestPermission().then(p=>{
  if(p==="granted"){
   setInterval(()=>{
    new Notification("Habit Reminder",{body:"Complete today’s habits"});
   },86400000);
  }
 });
}
</script>

<!-- ================= FIREBASE (UNCHANGED, VERIFIED) ================= -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth,GoogleAuthProvider,signInWithPopup,signOut,onAuthStateChanged }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore,doc,setDoc,onSnapshot }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app=initializeApp({
 apiKey:"AIzaSyDNoBvgu7W4txBT-nbnho_ILwU462bhlC4",
 authDomain:"habit-tracker-de698.firebaseapp.com",
 projectId:"habit-tracker-de698"
});

const auth=getAuth(app);
const db=getFirestore(app);
const provider=new GoogleAuthProvider();
 async function syncToCloudInternal(key, value) {
  if (USER_KEY === "guest") return;

  await setDoc(
    doc(db, "users", USER_KEY),
    {
      [key]: {
        value: value,
        updatedAt: Date.now()
      }
    },
    { merge: true }
  );
}

/* ✅ MAKE IT GLOBAL */
window.syncToCloud = syncToCloudInternal;


const loginBtn=document.getElementById("loginBtn");
const logoutBtn=document.getElementById("logoutBtn");
const userProfile=document.getElementById("userProfile");
const userPic=document.getElementById("userPic");
const userName=document.getElementById("userName");

loginBtn.onclick=()=>signInWithPopup(auth,provider);
logoutBtn.onclick=()=>signOut(auth);

let unsub=null;

onAuthStateChanged(auth,user=>{
 if(unsub)unsub();

 if(user){
  setUser(user.uid);
  loginBtn.style.display="none";
  logoutBtn.style.display="inline-block";
  userProfile.style.display="flex";
  userPic.src=user.photoURL;
  userName.textContent=user.displayName||user.email;

  const ref=doc(db,"users",user.uid);
  unsub=onSnapshot(ref,snap=>{
   const data=snap.data();
   if(!data)return;
   Object.keys(data).forEach(k => {
  const cloud = data[k];
  const local = localStorage.getItem(k);

 Object.keys(data).forEach(k => {
  localStorage.setItem(k, data[k].value);
});

});

   habits=JSON.parse(localStorage.getItem(ukey("habit-list")))||habits;
   render();
  });
 }else{
  setUser(null);
  loginBtn.style.display="inline-block";
  logoutBtn.style.display="none";
  userProfile.style.display="none";
  render();
 }
});


</script>
<script>
/* ===== PWA INSTALL (FINAL, SINGLE SCRIPT) ===== */
let deferredPrompt = null;
const installBtn = document.getElementById("installBtn");

/* Hide button if already installed */
if (window.matchMedia('(display-mode: standalone)').matches) {
  installBtn.style.display = "none";
}

/* Capture install prompt */
window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  deferredPrompt = e;
  installBtn.style.display = "inline-block";
});

/* Fallback visibility */
window.addEventListener("load", () => {
  if (!deferredPrompt && 'serviceWorker' in navigator) {
    installBtn.style.display = "inline-block";
  }
});

installBtn.addEventListener("click", async () => {
  if (!deferredPrompt) {
    alert("Use browser menu → Add to Home Screen");
    return;
  }
  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
  deferredPrompt = null;
  installBtn.style.display = "none";
});
</script>

</body>
</html>
